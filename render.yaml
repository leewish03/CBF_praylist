services:
  - type: web
    name: cbf-prayer-api
    env: python
    buildCommand: pip install -r requirements.txt
    # GOOGLE_SERVICE_ACCOUNT_JSON 환경변수에서 JSON 파일을 재생성 후 서버 시작
    startCommand: bash -c 'python -c "import os; j=os.environ.get(\"GOOGLE_SERVICE_ACCOUNT_JSON\",\"\"); open(\"cbf-praylist-11bbf27f1baa.json\",\"w\").write(j) if j else None" && python api_server.py'
    envVars:
      # Google Sheets 설정
      - key: SPREADSHEET_ID
        value: 1Bvl8bKvXQezJA3diKZM3sd_WauWSEG7jjjh7w3e74VI
      - key: RANGE_NAME
        value: "'설문지 응답 시트1'!A:Z"
      - key: SERVICE_ACCOUNT_FILE
        value: cbf-praylist-11bbf27f1baa.json
      # 구글 서비스 계정 JSON 전체 내용 (Render 대시보드에서 수동 입력)
      # cbf-praylist-11bbf27f1baa.json 파일 내용을 그대로 붙여넣으세요
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      # Notion 설정 (Render 대시보드에서 수동 입력)
      - key: NOTION_TOKEN
        sync: false
      - key: NOTION_PAGE_ID
        value: 1c50f7e0cd5f8025bb78c5c839f205f0
      # 로깅 설정
      - key: LOG_LEVEL
        value: INFO
      - key: LOG_FILE
        value: prayer_pipeline.log
      - key: LOG_MAX_SIZE_MB
        value: "10"
      - key: LOG_BACKUP_COUNT
        value: "5"
